<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سیستم احراز هویت</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="bg-animation">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <div class="particles" id="particles"></div>

  <div class="toast-container" id="toastContainer"></div>

  <div class="main-container">
    <div class="auth-wrapper">
      <div class="auth-card">
        <div class="auth-logo">
          <div class="logo-icon">🔐</div>
          <h1>AuthSystem</h1>
          <p>سیستم مدیریت کاربران</p>
        </div>

        <div class="tab-switcher">
          <button class="tab-btn active" data-tab="login">ورود</button>
          <button class="tab-btn" data-tab="register">ثبت نام</button>
          <div class="tab-slider left"></div>
        </div>

        <div class="form-container">
          <!-- Login Form -->
          <div class="form-panel" id="loginPanel">
            <form id="loginForm">
              <div class="input-group">
                <label>ایمیل</label>
                <div class="input-wrapper">
                  <input type="email" name="email" placeholder="example@email.com" required autocomplete="email">
                  <span class="input-icon">📧</span>
                </div>
              </div>

              <div class="input-group">
                <label>رمز عبور</label>
                <div class="input-wrapper">
                  <input type="password" name="password" placeholder="رمز عبور خود را وارد کنید" required autocomplete="current-password">
                  <span class="input-icon">🔒</span>
                  <button type="button" class="password-toggle">👁️</button>
                </div>
              </div>

              <div class="checkbox-group">
                <div class="custom-checkbox">
                  <input type="checkbox" id="rememberMe">
                  <span class="checkmark"></span>
                </div>
                <label for="rememberMe">مرا به خاطر بسپار</label>
              </div>

              <button type="submit" class="btn-submit btn-primary">
                <span class="btn-text">ورود به حساب</span>
              </button>
            </form>
          </div>

          <!-- Register Form -->
          <div class="form-panel hidden" id="registerPanel">
            <form id="registerForm">
              <div class="input-group">
                <label>نام کامل</label>
                <div class="input-wrapper">
                  <input type="text" name="fullName" placeholder="نام و نام خانوادگی" required autocomplete="name">
                  <span class="input-icon">👤</span>
                </div>
              </div>

              <div class="input-group">
                <label>ایمیل</label>
                <div class="input-wrapper">
                  <input type="email" name="email" placeholder="example@email.com" required autocomplete="email">
                  <span class="input-icon">📧</span>
                </div>
              </div>

              <div class="input-group">
                <label>رمز عبور</label>
                <div class="input-wrapper">
                  <input type="password" name="password" placeholder="حداقل ۶ کاراکتر + یک عدد" required minlength="6" autocomplete="new-password">
                  <span class="input-icon">🔒</span>
                  <button type="button" class="password-toggle">👁️</button>
                </div>
                <div class="password-strength">
                  <div class="strength-bar" id="str1"></div>
                  <div class="strength-bar" id="str2"></div>
                  <div class="strength-bar" id="str3"></div>
                  <div class="strength-bar" id="str4"></div>
                </div>
                <span class="strength-text" id="strengthText"></span>
              </div>

              <div class="input-group">
                <label>تکرار رمز عبور</label>
                <div class="input-wrapper">
                  <input type="password" name="confirmPassword" placeholder="رمز عبور را تکرار کنید" required autocomplete="new-password">
                  <span class="input-icon">🔐</span>
                </div>
              </div>

              <button type="submit" class="btn-submit btn-primary">
                <span class="btn-text">ثبت نام</span>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
